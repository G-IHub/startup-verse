<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Status Checker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #3A5AFE; margin-top: 0; font-size: 32px; }
    .status-box {
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }
    .status-checking { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
    .status-online { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .status-offline { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .info {
      background: #e7f3ff;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #3A5AFE;
    }
    .error {
      background: #fff3cd;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #ffc107;
    }
    button {
      background: #3A5AFE;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 10px 5px;
    }
    button:hover { background: #2845E8; }
    .endpoint {
      font-family: monospace;
      background: #e9ecef;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 10px 0;
      display: inline-block;
    }
    code { background: #e9ecef; padding: 2px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Backend deployment status</h1>

    <div id="status" class="status-box status-checking">Checking API…</div>
    <div id="details"></div>
    <div>
      <button type="button" onclick="checkStatus()">Recheck</button>
      <button type="button" onclick="testCreate()">Test create organization (needs JWT)</button>
    </div>

    <div class="info">
      <p><strong>API base</strong> (override with <code>?api=https://host/</code>):</p>
      <div class="endpoint" id="apiDisplay"></div>
      <p class="text-sm text-muted-foreground">Run the Express server from <code>/server</code> and align the client <code>VITE_API_URL</code> with this base.</p>
    </div>
    <div id="instructions"></div>
  </div>

  <script>
    const API_BASE = (() => {
      const q = new URLSearchParams(window.location.search).get("api");
      const value = (q && q.trim()) || "";
      if (!value) {
        throw new Error(
          "Pass the API base via the `?api=` query string (e.g. `?api=https://api.example.com/api/v1`).",
        );
      }
      return value;
    })().replace(/\/$/, "");

    document.getElementById("apiDisplay").textContent = API_BASE;

    async function checkStatus() {
      const statusDiv = document.getElementById("status");
      const detailsDiv = document.getElementById("details");
      const instructionsDiv = document.getElementById("instructions");
      statusDiv.className = "status-box status-checking";
      statusDiv.textContent = "Checking API…";
      detailsDiv.innerHTML = "";
      instructionsDiv.innerHTML = "";

      try {
        const response = await fetch(`${API_BASE}/health`);
        const data = await response.json().catch(() => ({}));
        if (response.ok && (data.status === "ok" || data.success === true)) {
          statusDiv.className = "status-box status-online";
          statusDiv.textContent = "API is reachable";
          detailsDiv.innerHTML = `<div class="info"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        } else {
          throw new Error(`HTTP ${response.status}`);
        }
      } catch (error) {
        statusDiv.className = "status-box status-offline";
        statusDiv.textContent = "API is not reachable";
        detailsDiv.innerHTML = `<div class="error"><p><strong>Error:</strong> ${error.message}</p></div>`;
        instructionsDiv.innerHTML = `
          <div class="info">
            <p>Start the API (from repo root):</p>
            <pre>cd server && npm install && npm run dev</pre>
            <p>Then open this page with <code>?api=</code> pointing at your API base if not on localhost.</p>
          </div>`;
      }
    }

    async function testCreate() {
      const detailsDiv = document.getElementById("details");
      const token = window.prompt("Paste a Bearer JWT (signed-in user)") || "";
      detailsDiv.innerHTML = '<div class="info">Testing organization creation…</div>';
      try {
        const response = await fetch(`${API_BASE}/organizations/create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: token ? `Bearer ${token}` : "",
          },
          body: JSON.stringify({
            name: "Test Org " + Date.now(),
            type: "accelerator",
            description: "Test organization",
            creatorId: "test-user",
            creatorEmail: "test@test.com",
            creatorName: "Test User",
          }),
        });
        const data = await response.json();
        if (data.success && data.data) {
          detailsDiv.innerHTML = `<div class="info"><h3>Created</h3><pre>${JSON.stringify(data.data, null, 2)}</pre></div>`;
        } else {
          throw new Error(JSON.stringify(data));
        }
      } catch (error) {
        detailsDiv.innerHTML = `<div class="error"><h3>Test failed</h3><p>${error.message}</p></div>`;
      }
    }

    window.onload = () => setTimeout(checkStatus, 300);
  </script>
</body>
</html>
