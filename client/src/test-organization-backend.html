<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization API test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .container { background: white; padding: 28px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { color: #3A5AFE; margin-top: 0; }
    button { background: #3A5AFE; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; margin: 8px 8px 8px 0; }
    button:hover { background: #2845E8; }
    .result { margin-top: 16px; padding: 12px; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #3A5AFE; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; max-height: 420px; overflow-y: auto; }
    .success { border-left-color: #2ECC71; }
    .error { border-left-color: #e74c3c; }
    label { display: block; font-size: 13px; margin: 12px 0 4px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; font-size: 13px; }
    code { background: #eee; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Organization API test</h1>
    <p>Point at your Express API (same base as <code>VITE_API_URL</code>). Authenticated calls need a JWT.</p>

    <label>API base (e.g. https://api.example.com/api/v1)</label>
    <input id="apiBase" type="text" placeholder="Paste your API base URL" value="" />

    <label>Bearer JWT (for create + search)</label>
    <input id="jwt" type="password" placeholder="Paste token from a signed-in session" />

    <div>
      <button type="button" onclick="testHealthCheck()">1. Health</button>
      <button type="button" onclick="testCreateOrganization()">2. Create test org</button>
      <button type="button" onclick="testSearchUser()">3. Search user by email</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    function api() {
      return document.getElementById("apiBase").value.replace(/\/$/, "");
    }
    function authHeader() {
      const t = document.getElementById("jwt").value.trim();
      return t ? { Authorization: `Bearer ${t}` } : {};
    }
    function showResult(data, ok) {
      const el = document.getElementById("result");
      el.className = "result " + (ok ? "success" : "error");
      el.textContent = JSON.stringify(data, null, 2);
    }

    async function testHealthCheck() {
      try {
        const response = await fetch(`${api()}/health`);
        const data = await response.json().catch(() => ({}));
        if (response.ok && (data.status === "ok" || data.success === true)) {
          showResult({ ok: true, data }, true);
        } else {
          showResult({ ok: false, status: response.status, data }, false);
        }
      } catch (e) {
        showResult({ ok: false, error: String(e) }, false);
      }
    }

    async function testCreateOrganization() {
      try {
        const body = {
          name: "Test Accelerator " + Date.now(),
          type: "accelerator",
          description: "Test organization via HTML harness",
          website: "https://example.com",
          creatorId: "test-user-" + Date.now(),
          creatorEmail: "test@example.com",
          creatorName: "Test User",
        };
        const response = await fetch(`${api()}/organizations/create`, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeader() },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        showResult({ status: response.status, data }, response.ok && data.success);
      } catch (e) {
        showResult({ ok: false, error: String(e) }, false);
      }
    }

    async function testSearchUser() {
      try {
        const response = await fetch(`${api()}/users/search-by-email`, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeader() },
          body: JSON.stringify({ email: "test@example.com" }),
        });
        const data = await response.json();
        showResult({ status: response.status, data }, response.ok);
      } catch (e) {
        showResult({ ok: false, error: String(e) }, false);
      }
    }
  </script>
</body>
</html>
