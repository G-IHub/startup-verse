<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Backend Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #3A5AFE;
      margin-top: 0;
    }
    button {
      background: #3A5AFE;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 10px 0;
    }
    button:hover {
      background: #2845E8;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      border-left: 4px solid #3A5AFE;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
    }
    .success {
      border-left-color: #2ECC71;
    }
    .error {
      border-left-color: #e74c3c;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      margin-left: 10px;
    }
    .status.ok {
      background: #d4edda;
      color: #155724;
    }
    .status.fail {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Organization Backend Test</h1>
    <p>Test your deployed Supabase backend for Organizations & Accelerators</p>
    
    <div>
      <button onclick="testHealthCheck()">1. Test Health Check</button>
      <button onclick="testCreateOrganization()">2. Create Test Organization</button>
      <button onclick="testSearchUser()">3. Search User by Email</button>
    </div>
    
    <div id="result"></div>
  </div>

  <script>
    const projectId = 'zuvrtclwxqycfskgtpbs';
    const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1dnJ0Y2x3eHF5Y2Zza2d0cGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNzA4NTcsImV4cCI6MjA4Mzk0Njg1N30.4QY7N-tAXL9LNzK5_c9WGF1UPbezNaWABkV7n29bM1M';
    const API_BASE = `https://${projectId}.supabase.co/functions/v1/make-server-78157e08`;

    function showResult(data, isSuccess = true) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
      resultDiv.textContent = JSON.stringify(data, null, 2);
    }

    async function testHealthCheck() {
      try {
        const response = await fetch(`${API_BASE}/health`);
        const data = await response.json();
        
        if (data.status === 'ok') {
          showResult({
            status: '✅ SUCCESS',
            message: 'Backend is healthy and responding!',
            data
          }, true);
        } else {
          showResult({
            status: '❌ FAILED',
            message: 'Unexpected response',
            data
          }, false);
        }
      } catch (error) {
        showResult({
          status: '❌ ERROR',
          message: error.message,
          error: error.toString()
        }, false);
      }
    }

    async function testCreateOrganization() {
      try {
        const testOrg = {
          name: 'Test Accelerator ' + Date.now(),
          type: 'accelerator',
          description: 'This is a test organization created via API',
          website: 'https://test.com',
          creatorId: 'test-user-' + Date.now(),
          creatorEmail: 'test@example.com',
          creatorName: 'Test User'
        };

        const response = await fetch(`${API_BASE}/organizations/create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${publicAnonKey}`
          },
          body: JSON.stringify(testOrg)
        });

        const data = await response.json();
        
        if (data.success && data.organization) {
          showResult({
            status: '✅ SUCCESS',
            message: 'Organization created successfully!',
            organization: data.organization
          }, true);
        } else {
          showResult({
            status: '❌ FAILED',
            message: 'Failed to create organization',
            data
          }, false);
        }
      } catch (error) {
        showResult({
          status: '❌ ERROR',
          message: error.message,
          error: error.toString()
        }, false);
      }
    }

    async function testSearchUser() {
      try {
        const response = await fetch(`${API_BASE}/users/search-by-email`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${publicAnonKey}`
          },
          body: JSON.stringify({ email: 'test@example.com' })
        });

        const data = await response.json();
        
        if (data.success !== undefined) {
          showResult({
            status: '✅ SUCCESS',
            message: 'User search endpoint working!',
            result: data
          }, true);
        } else {
          showResult({
            status: '❌ FAILED',
            message: 'Unexpected response',
            data
          }, false);
        }
      } catch (error) {
        showResult({
          status: '❌ ERROR',
          message: error.message,
          error: error.toString()
        }, false);
      }
    }

    // Auto-run health check on load
    window.onload = () => {
      setTimeout(testHealthCheck, 500);
    };
  </script>
</body>
</html>
